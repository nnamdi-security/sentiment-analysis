<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Republic — Comment Sentiment Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/compromise/14.14.0/compromise.min.js"></script>
<style>
  :root{
    --ink:#1c1c1e; --sub:#6b6b70; --bg:#faf9f7; --card:#ffffff; --line:#e7e5e1;
    --pos:#2f9e44; --pos-bg:#ebfbee;
    --neg:#e03131; --neg-bg:#fff5f5;
    --neu:#868e96; --neu-bg:#f1f3f5;
    --mix:#e8590c; --mix-bg:#fff4e6;
    --loc:#1971c2; --loc-bg:#e7f5ff;
    --food:#d9480f; --food-bg:#fff0e6;
    --people:#c2255c; --people-bg:#fff0f6;
    --brand:#0c8599; --brand-bg:#e3fafc;
    --pos-noun:#0c8599; --pos-verb:#4263eb; --pos-adj:#e8590c; --pos-adv:#c2255c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.5;}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 80px;}
  h1{font-size:1.55rem;margin:0 0 4px;letter-spacing:-0.01em;}
  .subtitle{color:var(--sub);font-size:0.92rem;margin-bottom:28px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:20px;}
  .panel h2{font-size:1.02rem;margin:0 0 14px;}
  .bars{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:0.85rem;}
  .bar-label{width:76px;flex-shrink:0;color:var(--sub);}
  .bar-track{flex:1;background:#f1f0ed;border-radius:6px;height:16px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}
  .bar-count{width:70px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums;}
  .verdict{font-size:0.93rem;}
  .verdict b{font-weight:600;}
  .verdict-good{color:var(--pos);}
  .reco{background:var(--neu-bg);border-left:3px solid var(--ink);border-radius:6px;padding:12px 14px;font-size:0.87rem;margin-top:14px;}
  .reco b{display:block;margin-bottom:4px;}

  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:18px;}
  .controls span.lbl{font-size:0.82rem;color:var(--sub);margin-right:4px;}
  .toggle{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:0.82rem;cursor:pointer;color:var(--ink);}
  .toggle.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .legend{display:none;flex-wrap:wrap;gap:10px 16px;font-size:0.78rem;color:var(--sub);margin-bottom:18px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;}
  .legend.show{display:flex;}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle;}

  .comment{background:var(--card);border:1px solid var(--line);border-left-width:5px;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .badge{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:2px 8px;border-radius:20px;}
  .emo{font-size:0.76rem;color:var(--sub);}
  .idx{font-size:0.7rem;color:#b8b6b1;margin-left:auto;}
  .ctext{font-size:0.92rem;}
  .hl{padding:0 2px;border-radius:3px;}
  .loc{background:var(--loc-bg);color:var(--loc);}
  .food{background:var(--food-bg);color:var(--food);}
  .people{background:var(--people-bg);color:var(--people);}
  .brand{background:var(--brand-bg);color:var(--brand);}
  .pos-noun{background:#e3fafc;color:var(--pos-noun);}
  .pos-verb{background:#edf2ff;color:var(--pos-verb);}
  .pos-adj{background:#fff4e6;color:var(--pos-adj);}
  .pos-adv{background:#fff0f6;color:var(--pos-adv);}
  footer{color:var(--sub);font-size:0.78rem;margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Chicken Republic — Customer Comment Sentiment Analysis</h1>
  <div class="subtitle" id="subtitle">Analyzing customer comments…</div>

  <div class="panel">
    <h2>Overall summary</h2>
    <div class="bars" id="bars"></div>
    <div class="verdict" id="verdict"></div>
    <div class="reco"><b>Recommendation</b><span id="reco-text"></span></div>
  </div>

  <div class="controls">
    <span class="lbl">Highlight:</span>
    <button class="toggle active" data-mode="none">Sentiment only</button>
    <button class="toggle" data-mode="locations">Locations</button>
    <button class="toggle" data-mode="entities">Entities</button>
    <button class="toggle" data-mode="pos">Parts of speech</button>
  </div>
  <div class="legend" id="legend-locations"><span><span class="swatch" style="background:var(--loc)"></span>City / country</span></div>
  <div class="legend" id="legend-entities">
    <span><span class="swatch" style="background:var(--food)"></span>Food item</span>
    <span><span class="swatch" style="background:var(--people)"></span>People</span>
    <span><span class="swatch" style="background:var(--brand)"></span>Brand (competitor)</span>
  </div>
  <div class="legend" id="legend-pos">
    <span><span class="swatch" style="background:var(--pos-noun)"></span>Noun</span>
    <span><span class="swatch" style="background:var(--pos-verb)"></span>Verb</span>
    <span><span class="swatch" style="background:var(--pos-adj)"></span>Adjective</span>
    <span><span class="swatch" style="background:var(--pos-adv)"></span>Adverb</span>
  </div>

  <div id="comments"></div>
  <footer id="footnote"></footer>
</div>

<script>

{t:"I thought it was a lie because I have been going to chicken Republic and they never offered me this option. But I asked for it today and guess what they gave me my order. NICE! NICE!", s:"positive", e:"Delight / surprise"},

{t:"Chicken republic go run am I'm sure chicken republic would be goated if they run it", s:"positive", e:"Admiration / hope"},
{t:"Anytime I'm trying to eat or buy all this market people foods, I will be praying not to fall in for their charms or whatever they're using to gain more customers,because some Dey sell pass chicken republic 😃. More than 30 people go dey shout \"samun waina\" at a particular time 🤔", s:"mixed", e:"Amusement / skepticism"},
{t:"The chicken republic at abule egba on Sundays, 10/10 jollof rice🥹", s:"positive", e:"Joy"},
{t:"Life no hard na you wan chop chicken republic", s:"positive", e:"Craving / amusement"},
{t:"Chicken Republic actually listened Fr 😂 I tried the newly introduced Smokey Jollof today and it's been properly revamped. Y'all need to try it out  and  it tastes  like real party Jollof now 😝", s:"positive", e:"Satisfaction"},

{t:"Chicken Republic has this thing with a good price and they are really doing well sometimes I've eaten from 3 of their  kitchens and they have been nice...", s:"positive", e:"Satisfaction / loyalty"},

{t:"My only disappointment is that chicken Republic don't make crispy fried chicken . And Winnie you will make a scary food critic though", s:"mixed", e:"Disappointment + amusement"},

{t:"My on the go food is definitely chicken republic's rice and chicken, I always ask the attendants for the day's tastier meal i.e. fried or jollof rice. For me chicken republic's burger is a big no no.", s:"mixed", e:"Satisfaction + dissatisfaction"},
{t:"Honestly In the veggies aspect chicken republic need to do more....the only thing I love about them is their chicken and affordability.....wow you were at Ikeja city mall if only I sighted you ...I'm a fan", s:"mixed", e:"Constructive criticism + loyalty"},
{t:"I like CR. The Jollof, moi moi and chicken is my favorite combo", s:"positive", e:"Affection"},
{t:"What you bought for 1,200 in chicken republic is 4,000 here in ikorodu  Same chicken republic", s:"negative", e:"Frustration / confusion"},
{t:"Chicken republic is very considerate when it's comes to budget.", s:"positive", e:"Value-appreciation"},
{t:"I've been to Chicken Republic in Uyo, and I enjoyed their rice and chicken. Probably you went there on a bad day.", s:"positive", e:"Satisfaction / brand defense"},
{t:"I worked in chicken republic for 1years &7 month the only issue we have at times we as a cook when we run out of food", s:"mixed", e:"Insider observation / operational concern"},
{t:"Chicken republic is so affordable that's why there's is a lot of people, what is so expensive in KFC is so affordable in CHICKEN REPUBLIC ..We need more of this to put most fast food on their toes . From G", s:"positive", e:"Admiration / value-appreciation"}
];

const LOCATIONS = ["Nwaniba road","Ikeja City Mall","Abule Egba","Awolowo 2","Adamawa","Liberia","Onitsha","Osogbo","Ikorodu","Ibadan","Owerri","Opebi","Ikeja","Warri","Wuse","Yola","Uyo","Lagos","Aguda","Nigeria"];
const FOOD = ["bucket of chicken","chief burger","wizz meal","chickwizz","chickwhizz","smokey jollof","jollof rice","fried chicken","fish pie","chicken pie","meat pie","caribbean rice","rice and beans","fried rice","goat meat","green peas","egg rolls","samun waina","moi moi","jollof","burger","chicken","cakes","cake","veggies","rice","fries"];
const PEOPLE = ["attendants","customers","Nigerians","Winnie","mama","cook","chef","girls","team","man"];
const BRAND = ["KFC"];

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function highlightTerms(text, groups){
  let all=[];
  groups.forEach(g=>g.terms.forEach(term=>all.push({term,cls:g.cls})));
  all.sort((a,b)=>b.term.length-a.term.length);
  const lower=text.toLowerCase();
  let matches=[];
  all.forEach(({term,cls})=>{
    const esc=term.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const re=new RegExp("\\b"+esc+"\\b","g");
    let m;
    while((m=re.exec(lower))){
      const start=m.index, end=start+term.length;
      if(!matches.some(x=>start<x.end && end>x.start)) matches.push({start,end,cls});
    }
  });
  matches.sort((a,b)=>a.start-b.start);
  let out="", pos=0;
  matches.forEach(m=>{
    out+=escapeHtml(text.slice(pos,m.start));
    out+=`<span class="hl ${m.cls}">${escapeHtml(text.slice(m.start,m.end))}</span>`;
    pos=m.end;
  });
  out+=escapeHtml(text.slice(pos));
  return out;
}

function posHighlight(text){
  try{
    if(!window.nlp) return escapeHtml(text);
    const doc = window.nlp(text);
    const sentences = doc.json();
    let out="";
    sentences.forEach(sent=>{
      (sent.terms||[]).forEach(term=>{
        const tags = term.tags||[];
        let cls="";
        if(tags.includes("Verb")) cls="pos-verb";
        else if(tags.includes("Adjective")) cls="pos-adj";
        else if(tags.includes("Adverb")) cls="pos-adv";
        else if(tags.includes("Noun")) cls="pos-noun";
        const pre = escapeHtml(term.pre||"");
        const post = escapeHtml(term.post||"");
        const txt = escapeHtml(term.text||"");
        out += pre + (cls?`<span class="hl ${cls}">${txt}</span>`:txt) + post;
      });
    });
    return out || escapeHtml(text);
  }catch(err){
    return escapeHtml(text);
  }
}

const sentColors = {
  positive:{c:"var(--pos)",bg:"var(--pos-bg)"},
  negative:{c:"var(--neg)",bg:"var(--neg-bg)"},
  neutral:{c:"var(--neu)",bg:"var(--neu-bg)"},
  mixed:{c:"var(--mix)",bg:"var(--mix-bg)"}
};

let mode = "none";

function renderBody(text){
  if(mode==="locations") return highlightTerms(text,[{terms:LOCATIONS,cls:"loc"}]);
  if(mode==="entities") return highlightTerms(text,[{terms:FOOD,cls:"food"},{terms:PEOPLE,cls:"people"},{terms:BRAND,cls:"brand"}]);
  if(mode==="pos") return posHighlight(text);
  return escapeHtml(text);
}

function render(){
  const container = document.getElementById("comments");
  container.innerHTML = comments.map((c,i)=>{
    const col = sentColors[c.s];
    return `<div class="comment" style="border-left-color:${col.c}">
      <div class="meta">
        <span class="badge" style="background:${col.bg};color:${col.c}">${c.s}</span>
        <span class="emo">${c.e}</span>
        <span class="idx">#${i+1}</span>
      </div>
      <div class="ctext">${renderBody(c.t)}</div>
    </div>`;
  }).join("");
}

function renderSummary(){
  const total = comments.length;
  const counts = {positive:0,negative:0,neutral:0,mixed:0};
  comments.forEach(c=>counts[c.s]++);
  const order = ["positive","negative","mixed","neutral"];
  document.getElementById("bars").innerHTML = order.map(k=>{
    const col = sentColors[k];
    const pct = Math.round(counts[k]/total*100);
    return `<div class="bar-row">
      <div class="bar-label" style="text-transform:capitalize">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col.c}"></div></div>
      <div class="bar-count">${counts[k]} (${pct}%)</div>
    </div>`;
  }).join("");

  document.getElementById("subtitle").textContent = `${total} customer comments analyzed for sentiment, emotion, location, and entity mentions.`;

  document.getElementById("verdict").innerHTML =
    `Overall, customers are <b class="verdict-good">clearly happy</b> with Chicken Republic — <b>${counts.positive} of ${total}</b> comments (${Math.round(counts.positive/total*100)}%) are positive, versus <b>${counts.negative}</b> negative, <b>${counts.mixed}</b> mixed, and <b>${counts.neutral}</b> neutral/informational.
    <br><br>The main emotion driving the positive sentiment is <b>satisfaction, admiration, and loyalty</b> — especially around the taste and value of the Jollof rice (including strong praise for the newly launched Smokey Jollof), the chicken itself, affordability compared to competitors like KFC, and nostalgic, long-term attachment to the brand. A secondary but strong thread is <b>craving/desire</b> language ("cravings", "chop", "double chickwizz").
    <br><br>Where customers are unhappy, the driving emotion is <b>frustration and disappointment</b> — chiefly about inconsistent quality and shrinking portion sizes across branches (Onitsha, Warri), price increases and price inconsistency between branches (Ikorodu vs. elsewhere), a stagnant Jollof recipe some find bland, and one serious food-safety complaint about reused frying oil at the Uyo branch.`;

  document.getElementById("reco-text").innerHTML =
    ` Standardize recipes, portion sizes, and pricing across branches so the experience matches the "one recipe for all branches" reputation customers value; investigate the reused-oil complaint (Nwaniba Road, Uyo) as a priority food-safety issue; keep and promote the Smokey Jollof momentum since it is winning back skeptics of the classic Jollof; and expand vegetable options, which came up as the clearest recurring gap.`;

  document.getElementById("footnote").textContent =
    `Note: ${total} distinct comments were identified in the pasted text (the message referenced 60). Color coding — sentiment: green=positive, red=negative, gray=neutral, amber=mixed. Use the "Highlight" toggle above to switch between location tagging, entity tagging (food/people/brand), and part-of-speech tagging within each comment.`;
}

document.querySelectorAll(".toggle").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".toggle").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    document.querySelectorAll(".legend").forEach(l=>l.classList.remove("show"));
    if(mode==="locations") document.getElementById("legend-locations").classList.add("show");
    if(mode==="entities") document.getElementById("legend-entities").classList.add("show");
    if(mode==="pos") document.getElementById("legend-pos").classList.add("show");
    render();
  });
});

renderSummary();
render();
</script>
</body>
</html>
